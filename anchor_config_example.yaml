# 앵커 기반 ROI 탐지 설정 예시
#
# 이 파일은 PC 화면 캡쳐 영상에서 프로그램 창 위치가 달라져도
# 고정 참조점(앵커)을 기준으로 ROI를 자동 탐지하기 위한 설정입니다.
#
# 사용법:
#   python -m src.main --video input.mp4 --anchor-config config/anchor_config.yaml
#
# 좌표 체계: 정규화 좌표 (0.0~1.0, 기준 영역 크기 대비 비율)
# 앵커 유형: "snippet" (이미지 매칭) | "text" (OCR + 정규식 매칭)

# ─────────────────────────────────────────
# 1. 앵커 정의 (프레임에서 찾을 고정 참조점)
# ─────────────────────────────────────────
anchors:
  # 스니펫 앵커: 프로그램 아이콘/로고를 이미지 매칭으로 탐지
  - name: "temp_icon"
    anchor_type: "snippet"
    snippet_path: "anchors/temp_icon.png"  # 상대 경로 (이 YAML 파일 기준)
    match_threshold: 0.7                   # 매칭 신뢰도 임계값 (0.0~1.0)
    window_pattern: "Temperature.*"        # 이 앵커를 찾을 윈도우 타이틀 (정규식, 선택)
    # source_resolution: [1920, 1080]      # 스니펫 캡처 시 프레임 해상도 (해상도 적응용)

  # 텍스트 앵커: 화면의 특정 라벨 텍스트를 OCR로 탐지
  - name: "pressure_label"
    anchor_type: "text"
    search_text: "Pressure"                # 검색 텍스트 (정규식 지원)
    match_threshold: 0.6
    window_pattern: "Pressure.*"

# ─────────────────────────────────────────
# 2. ROI 매핑 (앵커 기준 정규화 오프셋)
# ─────────────────────────────────────────
# nx, ny: 앵커 bbox 좌상단 기준 X/Y 오프셋 (기준 영역 크기 대비)
# nw, nh: ROI 너비/높이 (기준 영역 크기 대비)
roi_mappings:
  - anchor_name: "temp_icon"               # 참조할 앵커 이름
    roi_name: "temperature_value"          # 생성될 ROI 이름
    offset:
      nx: 0.08                             # 앵커에서 오른쪽 8%
      ny: 0.0                              # 앵커와 같은 높이
      nw: 0.06                             # 기준 영역 너비의 6%
      nh: 0.03                             # 기준 영역 높이의 3%
    roi_type: "numeric"                    # numeric | text | chart

  - anchor_name: "pressure_label"
    roi_name: "pressure_value"
    offset:
      nx: 0.0                              # 라벨 바로 아래
      ny: 0.03                             # 앵커 아래 3%
      nw: 0.08
      nh: 0.03
    roi_type: "numeric"

# ─────────────────────────────────────────
# 3. 윈도우 탐지 설정 (선택)
# ─────────────────────────────────────────
enable_window_detection: true              # 프로그램 창 경계 자동 탐지
window_title_patterns:                     # 처리할 윈도우 타이틀 필터 (정규식)
  - "Temperature.*"
  - "Pressure.*"

# ─────────────────────────────────────────
# 4. 폴백 설정 (선택)
# ─────────────────────────────────────────
fallback_to_homography: false              # 앵커 실패 시 호모그래피 폴백
# reference_frame_path: "reference/desktop_ref.png"  # 참조 프레임 경로

# ─────────────────────────────────────────
# 5. 매칭 엔진 세부 설정 (선택, 기본값 사용 권장)
# ─────────────────────────────────────────
# matcher_config:
#   edge_match_threshold: 0.55             # 에지 매칭 임계값 (기본 0.55)
#   feature_match_min_count: 8             # AKAZE 최소 매칭 수
#   feature_match_min_count_small: 4       # 소형 스니펫용 AKAZE 최소 매칭 수
#   small_template_threshold: 100          # 소형 스니펫 판단 기준 (px)
#   fallback_match_threshold: 0.85         # 마스크 폴백 임계값
#   multi_scale_factors: [1.0, 0.75, 0.5, 1.25, 1.5]
#   auto_canny: true                       # Otsu 기반 자동 Canny 임계값 (기본 활성화)
#   multi_clahe: false                     # 다중 CLAHE 폴백 (성능 트레이드오프)
#   adaptive_scale: false                  # 적응적 스케일 범위
#   adaptive_scale_steps: 5               # 스케일 탐색 단계 수
#   adaptive_scale_step_size: 0.05        # 스케일 탐색 간격
#   top_n_candidates: 5                    # Top-N 후보 수
#   candidate_nms_radius: 20              # NMS 반경 (px)

# ─────────────────────────────────────────
# 6. 기타 설정
# ─────────────────────────────────────────
iou_merge_threshold: 0.5                   # 중복 ROI 병합 IoU 임계값

# ─────────────────────────────────────────
# 7. 다중 후보 공간 검증 (선택)
# ─────────────────────────────────────────
# enable_spatial_validation: false         # 다중 후보 공간 검증 활성화
# spatial_validation_top_n: 5             # 검증할 후보 수
# spatial_penalty_weight: 0.3             # 공간 페널티 가중치
