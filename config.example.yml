# ============================================================
# video_detection 설정 파일 템플릿
#
# 사용법:
#   1. 이 파일을 config/config.yml로 복사
#   2. 환경별: config/config.dev.yml, config/config.prod.yml 생성
#   3. DB 비밀번호는 환경변수로: export DB_PASSWORD=...
#   4. 실행: python -m src.main --config config/config.yml
#   5. 환경 지정: python -m src.main --env prod
#
# 설정 우선순위 (높은 것이 우선):
#   CLI args > config.{env}.yml > config.yml > 환경변수(secrets) > 기본값
#
# ${VAR_NAME} 문법으로 환경변수를 참조할 수 있습니다.
# ============================================================

# --- ROI 템플릿 선택 ---
template:
  id: null                            # ROI 템플릿 ID (정수, name보다 우선)
  name: null                          # ROI 템플릿 이름 (문자열)

# --- ROI 탐지 설정 ---
detection:
  auto_detect: false                  # 첫 프레임에서 ROI 자동 탐지
  roi_template_paths: []              # 색상 마커 ROI 템플릿 이미지 경로 (리스트)
  anchor_config_path: null            # 앵커 기반 ROI 탐지 YAML 경로
  ssim_threshold: 0.95                # SSIM 변화 감지 임계값 (0.0~1.0)
  confidence_threshold: 0.7           # OCR 신뢰도 임계값 (0.0~1.0)

# --- 비디오 처리 ---
processing:
  frame_skip_mode: adaptive           # fixed | adaptive
  default_interval_sec: 1.0           # 프레임 분석 간격 (초)
  change_detection_interval_sec: 0.17 # 변화 감지 시 간격 (~6fps)
  change_threshold: 0.05              # 프레임 변화 감지 임계값 (0.0~1.0)
  batch_size: 32                      # 배치 처리 프레임 수
  max_workers: 0                      # 0 = 자동 (CPU 코어의 75%)
  resize_width: 0                     # 0 = 원본 유지
  resize_height: 0                    # 0 = 원본 유지
  parallel_timeout_per_roi: 10.0      # ROI당 타임아웃 (초)
  use_gpu: false                      # GPU 가속 (PaddleOCR)

# --- 저장소 ---
storage:
  db_host: localhost                  # Oracle 데이터베이스 호스트
  db_port: 1521                       # Oracle 데이터베이스 포트
  db_service_name: ORCL               # Oracle 서비스 이름
  db_user: "${DB_USER}"               # 환경변수에서 로드 (export DB_USER=...)
  db_password: "${DB_PASSWORD}"        # 환경변수에서 로드 (절대 직접 입력 금지)
  db_dsn: ""                          # DSN 직접 지정 시 host/port/service_name 대신 사용
  output_dir: ./data                  # 결과 저장 디렉토리
  save_frames: false                  # 분석 프레임 이미지 저장 여부
  frame_format: jpg                   # 프레임 이미지 형식 (jpg | jpeg | png | webp)
  frame_quality: 85                   # JPEG 품질 (1-100)

# --- 배치 스케줄링 ---
batch:
  enabled: false                      # 배치 스케줄링 모드 활성화
  watch_dir: null                     # 스캔할 비디오 디렉토리 경로
  interval_seconds: 300               # 배치 사이클 간격 (초, 기본 5분)

# --- 디버그 & 로깅 ---
debug: false                          # 디버그 모드 활성화
log_level: INFO                       # DEBUG | INFO | WARNING | ERROR | CRITICAL
